<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mystic Item DB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-dark: #1a1a2e;
      --bg-panel: #16213e;
      --bg-card: #0f3460;
      --bg-input: #1a1a40;
      --accent: #e94560;
      --green: #4ecca3;
      --gold: #ffd700;
      --text: #eaeaea;
      --text-muted: #8892b0;
      --border: #2a2a5a;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      --radius: 8px;
      --pixel-font: 'Press Start 2P', monospace;
      --body-font: 'Inter', system-ui, sans-serif;
    }

    body {
      font-family: var(--body-font);
      background: var(--bg-dark);
      background-image:
        linear-gradient(rgba(26, 26, 46, 0.97), rgba(26, 26, 46, 0.97)),
        url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 16 16' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='8' height='8' fill='%232a2a5a' fill-opacity='0.3'/%3E%3Crect x='8' y='8' width='8' height='8' fill='%232a2a5a' fill-opacity='0.3'/%3E%3C/svg%3E");
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .app { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

    .header { text-align: center; padding: 2rem 1rem 1.5rem; }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .logo-icon { font-size: 2rem; }

    .header h1 {
      font-family: var(--pixel-font);
      font-size: clamp(0.9rem, 2.5vw, 1.3rem);
      color: var(--gold);
      text-shadow: 2px 2px 0 var(--accent);
    }

    .subtitle { color: var(--text-muted); font-size: 0.95rem; }

    .stats-bar {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: var(--bg-panel);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1.25rem;
      text-align: center;
      min-width: 100px;
    }

    .stat-value {
      display: block;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--gold);
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .panel {
      background: var(--bg-panel);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .toolbar h2 { font-size: 1.1rem; font-weight: 600; color: var(--green); }

    .search-box input {
      background: var(--bg-input);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 0.65rem 0.85rem;
      font-size: 0.95rem;
      font-family: inherit;
      width: 240px;
      transition: border-color 0.2s;
    }

    .search-box input:focus { outline: none; border-color: var(--accent); }

    .category-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .filter-chip {
      background: var(--bg-input);
      border: 2px solid var(--border);
      border-radius: 999px;
      color: var(--text-muted);
      padding: 0.35rem 0.85rem;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }

    .filter-chip:hover { border-color: var(--accent); color: var(--text); }

    .filter-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .filter-chip .chip-count { opacity: 0.75; margin-left: 0.25rem; }

    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .item-card {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: border-color 0.2s, transform 0.2s;
    }

    .item-card:hover { border-color: var(--green); transform: translateY(-2px); }

    .item-card-header { display: flex; align-items: center; gap: 0.75rem; }

    .item-icon-wrap {
      width: 52px;
      height: 52px;
      background: var(--bg-input);
      border: 2px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .item-icon-wrap img {
      width: 36px;
      height: 36px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .item-icon-wrap .no-icon { font-size: 1.25rem; opacity: 0.4; }

    .item-card-meta {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      min-width: 0;
    }

    .item-name { font-weight: 700; font-size: 1rem; word-break: break-word; }

    .category-badge {
      display: inline-block;
      align-self: flex-start;
      background: rgba(78, 204, 163, 0.15);
      border: 1px solid var(--green);
      color: var(--green);
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
    }

    .item-prices {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
    }

    .price-chip {
      background: var(--bg-input);
      border-radius: 6px;
      padding: 0.5rem;
      text-align: center;
    }

    .price-chip-label {
      display: block;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      margin-bottom: 0.2rem;
    }

    .price-chip-value {
      display: block;
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--gold);
      font-variant-numeric: tabular-nums;
    }

    .empty-state, .loading-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .empty-icon { font-size: 2.5rem; display: block; margin-bottom: 0.75rem; }

    .footer {
      text-align: center;
      padding: 2rem 1rem 1rem;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    @media (max-width: 768px) {
      .search-box input { width: 100%; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .item-prices { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">📖</span>
        <h1>Mystic Item DB</h1>
      </div>
      <p class="subtitle">Minecraft item price list</p>
    </header>

    <div class="stats-bar">
      <div class="stat">
        <span class="stat-value" id="stat-items">0</span>
        <span class="stat-label">Items</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-categories">0</span>
        <span class="stat-label">Categories</span>
      </div>
    </div>

    <section class="panel">
      <div class="toolbar">
        <h2>Price List</h2>
        <div class="search-box">
          <input type="text" id="search" placeholder="Search items…">
        </div>
      </div>
      <div class="category-filters" id="category-filters"></div>
      <div class="items-grid" id="items-grid">
        <div class="loading-state">
          <span class="empty-icon">⏳</span>
          <p>Loading database…</p>
        </div>
      </div>
    </section>

    <footer class="footer">
      <p id="footer-meta">Read-only showcase · Prices per item, half stack &amp; full stack</p>
    </footer>
  </div>

  <script>
    const DB_FILE = 'db.json';

    let items = [];
    let categories = [];
    let activeCategory = '';

    const itemsGrid = document.getElementById('items-grid');
    const categoryFilters = document.getElementById('category-filters');
    const searchInput = document.getElementById('search');
    const statItems = document.getElementById('stat-items');
    const statCategories = document.getElementById('stat-categories');
    const footerMeta = document.getElementById('footer-meta');

    function formatPrice(value) {
      if (value == null || isNaN(value)) return '—';
      return value.toLocaleString(undefined, {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2,
      });
    }

    function calcPrices(pricePerItem, stackSize) {
      const half = Math.floor(stackSize / 2);
      return {
        perItem: pricePerItem,
        halfStack: pricePerItem * half,
        fullStack: pricePerItem * stackSize,
        halfCount: half,
        fullCount: stackSize,
      };
    }

    function getItemCategory(item) {
      return item.category || 'Misc';
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function getFilteredItems() {
      const query = searchInput.value.toLowerCase().trim();
      return items.filter((item) => {
        const matchesSearch = !query || item.name.toLowerCase().includes(query);
        const matchesCategory = !activeCategory || getItemCategory(item) === activeCategory;
        return matchesSearch && matchesCategory;
      });
    }

    function getCategoryCounts() {
      const counts = {};
      for (const item of items) {
        const cat = getItemCategory(item);
        counts[cat] = (counts[cat] || 0) + 1;
      }
      return counts;
    }

    function updateStats() {
      statItems.textContent = items.length;
      statCategories.textContent = new Set(items.map(getItemCategory)).size;
    }

    function renderCategoryFilters() {
      const counts = getCategoryCounts();
      const usedCategories = Object.keys(counts).sort((a, b) => a.localeCompare(b));
      const allCategories = [...new Set([...categories, ...usedCategories])].sort((a, b) =>
        a.localeCompare(b)
      );

      categoryFilters.innerHTML = `
        <button type="button" class="filter-chip${activeCategory === '' ? ' active' : ''}" data-category="">
          All<span class="chip-count">(${items.length})</span>
        </button>
        ${allCategories
          .map((cat) => {
            const count = counts[cat] || 0;
            if (count === 0) return '';
            return `
              <button type="button" class="filter-chip${activeCategory === cat ? ' active' : ''}" data-category="${escapeHtml(cat)}">
                ${escapeHtml(cat)}<span class="chip-count">(${count})</span>
              </button>
            `;
          })
          .join('')}
      `;
    }

    function renderItems() {
      const filtered = getFilteredItems();
      const query = searchInput.value.trim();
      const hasFilters = query || activeCategory;

      updateStats();
      renderCategoryFilters();

      if (filtered.length === 0) {
        itemsGrid.innerHTML = '';
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = hasFilters
          ? '<span class="empty-icon">🔍</span><p>No items match your filters.</p>'
          : '<span class="empty-icon">🗃️</span><p>No items in the database.</p>';
        itemsGrid.appendChild(empty);
        return;
      }

      itemsGrid.innerHTML = filtered
        .map((item) => {
          const p = calcPrices(item.pricePerItem, item.stackSize);
          const category = getItemCategory(item);
          const iconHtml = item.iconData
            ? `<img src="${item.iconData}" alt="${escapeHtml(item.name)}">`
            : '<span class="no-icon">?</span>';

          return `
            <article class="item-card">
              <div class="item-card-header">
                <div class="item-icon-wrap">${iconHtml}</div>
                <div class="item-card-meta">
                  <span class="item-name">${escapeHtml(item.name)}</span>
                  <span class="category-badge">${escapeHtml(category)}</span>
                </div>
              </div>
              <div class="item-prices">
                <div class="price-chip">
                  <span class="price-chip-label">Per Item</span>
                  <span class="price-chip-value">${formatPrice(p.perItem)}</span>
                </div>
                <div class="price-chip">
                  <span class="price-chip-label">Half (${p.halfCount})</span>
                  <span class="price-chip-value">${formatPrice(p.halfStack)}</span>
                </div>
                <div class="price-chip">
                  <span class="price-chip-label">Stack (${p.fullCount})</span>
                  <span class="price-chip-value">${formatPrice(p.fullStack)}</span>
                </div>
              </div>
            </article>
          `;
        })
        .join('');
    }

    function showError(message) {
      itemsGrid.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">⚠️</span>
          <p>${escapeHtml(message)}</p>
        </div>
      `;
      updateStats();
    }

    async function loadDatabase() {
      try {
        const res = await fetch(DB_FILE);
        if (!res.ok) throw new Error('Database file not found');

        const data = await res.json();

        if (!Array.isArray(data.items)) {
          throw new Error('Invalid db.json — missing items array');
        }

        items = data.items;
        categories = Array.isArray(data.categories) ? data.categories : [];

        if (data.exportedAt) {
          const date = new Date(data.exportedAt).toLocaleDateString();
          footerMeta.textContent = `Last updated ${date} · Prices per item, half stack & full stack`;
        }

        renderItems();
      } catch {
        showError(`Could not load ${DB_FILE}. Make sure the file exists next to this page.`);
      }
    }

    categoryFilters.addEventListener('click', (e) => {
      const chip = e.target.closest('.filter-chip');
      if (!chip) return;
      activeCategory = chip.dataset.category || '';
      renderItems();
    });

    searchInput.addEventListener('input', renderItems);
    loadDatabase();
  </script>
</body>
</html>
