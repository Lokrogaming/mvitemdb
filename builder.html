<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mystic Item DB — Component Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <!--- QUARANTINE  -->
<script src="https://lokro.dev/JS/modules/quarantineMode.js" defer></script>
<!------>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-dark: #1a1a2e; --bg-panel: #16213e; --bg-card: #0f3460; --bg-input: #1a1a40;
      --accent: #e94560; --accent-hover: #ff6b6b; --green: #4ecca3; --gold: #ffd700;
      --text: #eaeaea; --text-muted: #8892b0; --border: #2a2a5a;
      --shadow: 0 4px 24px rgba(0,0,0,0.4); --radius: 8px;
      --pixel-font: 'Press Start 2P', monospace; --body-font: 'Inter', system-ui, sans-serif;
    }
    body {
      font-family: var(--body-font);
      background: var(--bg-dark);
      background-image: linear-gradient(rgba(26,26,46,.97), rgba(26,26,46,.97)),
        url("data:image/svg+xml,%3Csvg width='16' height='16' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='8' height='8' fill='%232a2a5a' fill-opacity='0.3'/%3E%3Crect x='8' y='8' width='8' height='8' fill='%232a2a5a' fill-opacity='0.3'/%3E%3C/svg%3E");
      color: var(--text); min-height: 100vh; line-height: 1.5;
    }
    .app { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
    .header { text-align: center; padding: 2rem 1rem 1rem; }
    .logo { display: flex; align-items: center; justify-content: center; gap: .75rem; margin-bottom: .5rem; }
    .logo-icon { font-size: 2rem; }
    .header h1 { font-family: var(--pixel-font); font-size: clamp(.85rem, 2.5vw, 1.2rem); color: var(--gold); text-shadow: 2px 2px 0 var(--accent); }
    .subtitle { color: var(--text-muted); font-size: .95rem; }
    .header-actions { display: flex; justify-content: center; flex-wrap: wrap; gap: .75rem; margin-top: 1.25rem; }
    .panel { background: var(--bg-panel); border: 2px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--shadow); }
    .panel h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.25rem; color: var(--green); }
    .panel-header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1.25rem; }
    .panel-header h2 { margin-bottom: 0; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 1rem; margin-bottom: 1rem; }
    .form-row-2 { grid-template-columns: 1fr 1fr; }
    .form-group { display: flex; flex-direction: column; gap: .4rem; }
    .form-group-sm { width: 100px; }
    .form-group label { font-size: .8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
    .form-group input, .form-group select, .search-box input, .meta-input {
      background: var(--bg-input); border: 2px solid var(--border); border-radius: var(--radius);
      color: var(--text); padding: .65rem .85rem; font-size: .95rem; font-family: inherit;
    }
    .form-group input:focus, .search-box input:focus, .meta-input:focus { outline: none; border-color: var(--accent); }
    .icon-upload-area {
      position: relative; border: 2px dashed var(--border); border-radius: var(--radius);
      background: var(--bg-input); min-height: 120px; display: flex; align-items: center;
      justify-content: center; cursor: pointer; overflow: hidden;
    }
    .icon-upload-area:hover, .icon-upload-area.dragover { border-color: var(--accent); background: rgba(233,69,96,.08); }
    .icon-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 2; }
    .upload-placeholder { display: flex; flex-direction: column; align-items: center; gap: .4rem; padding: 1rem; text-align: center; pointer-events: none; }
    .upload-hint { font-size: .75rem; color: var(--text-muted); }
    .icon-preview { width: 64px; height: 64px; image-rendering: pixelated; position: relative; z-index: 1; }
    .price-preview { background: var(--bg-input); border: 2px solid var(--border); border-radius: var(--radius); padding: .75rem 1rem; min-height: 120px; display: flex; flex-direction: column; gap: .5rem; justify-content: center; }
    .price-row { display: flex; justify-content: space-between; align-items: center; }
    .price-label { font-size: .85rem; color: var(--text-muted); }
    .price-value { font-weight: 700; color: var(--gold); }
    .form-actions, .filter-bar { display: flex; flex-wrap: wrap; gap: .75rem; align-items: center; }
    .btn {
      padding: .7rem 1.25rem; border: none; border-radius: var(--radius); font-family: inherit;
      font-size: .85rem; font-weight: 600; cursor: pointer; transition: transform .1s, background .2s, border-color .2s, color .2s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--green); color: var(--green); }
    .btn-edit { background: transparent; border: 1px solid var(--green); color: var(--green); padding: .4rem .75rem; font-size: .8rem; }
    .btn-edit:hover { background: var(--green); color: var(--bg-dark); }
    .btn-danger { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: .4rem .75rem; font-size: .8rem; }
    .btn-danger:hover { background: var(--accent); color: #fff; }
    .btn-sort { background: var(--bg-input); border: 2px solid var(--border); color: var(--text); padding: .55rem .85rem; min-width: 72px; }
    .btn-sort:hover, .btn-sort.desc { border-color: var(--green); color: var(--green); }
    .sort-controls { display: flex; align-items: center; gap: .5rem; }
    .sort-controls label { font-size: .8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
    .category-filters { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1.25rem; }
    .filter-chip {
      background: var(--bg-input); border: 2px solid var(--border); border-radius: 999px;
      color: var(--text-muted); padding: .35rem .85rem; font-family: inherit; font-size: .8rem; cursor: pointer;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--text); }
    .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .item-card { background: var(--bg-card); border: 2px solid var(--border); border-radius: var(--radius); padding: 1rem; display: flex; flex-direction: column; gap: .75rem; }
    .item-card-header { display: flex; align-items: center; gap: .75rem; }
    .item-icon-wrap { width: 48px; height: 48px; background: var(--bg-input); border: 2px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .item-icon-wrap img { width: 32px; height: 32px; image-rendering: pixelated; }
    .item-icon-wrap .no-icon { opacity: .4; }
    .item-name { font-weight: 700; word-break: break-word; }
    .category-badge { display: inline-block; align-self: flex-start; background: rgba(78,204,163,.15); border: 1px solid var(--green); color: var(--green); font-size: .65rem; font-weight: 600; text-transform: uppercase; padding: .15rem .5rem; border-radius: 999px; margin-top: .25rem; }
    .item-prices { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .5rem; }
    .price-chip { background: var(--bg-input); border-radius: 6px; padding: .5rem; text-align: center; }
    .price-chip-label { display: block; font-size: .65rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: .2rem; }
    .price-chip-value { display: block; font-weight: 700; font-size: .85rem; color: var(--gold); }
    .item-card-actions { display: flex; gap: .5rem; margin-top: auto; }
    .empty-state { grid-column: 1 / -1; text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
    .empty-icon { font-size: 2.5rem; display: block; margin-bottom: .75rem; }
    .item-count { display: inline-flex; background: var(--accent); color: #fff; font-size: .75rem; padding: .15rem .5rem; border-radius: 999px; margin-left: .5rem; }
    .footer { text-align: center; padding: 1.5rem; color: var(--text-muted); font-size: .8rem; }
    .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; display: flex; flex-direction: column; gap: .5rem; z-index: 1000; }
    .toast { background: var(--bg-panel); border: 2px solid var(--border); border-radius: var(--radius); padding: .75rem 1.25rem; font-size: .85rem; box-shadow: var(--shadow); animation: slideIn .3s ease; }
    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--accent); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .hidden { display: none !important; }
    @media (max-width: 768px) {
      .form-row, .form-row-2 { grid-template-columns: 1fr; }
      .form-group-sm { width: 100%; }
      .item-prices { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo"><span class="logo-icon">🧩</span><h1>Component Builder</h1></div>
      <p class="subtitle">Build your own item pack and export it as a component</p>
      <div class="header-actions">
        <button type="button" class="btn btn-outline" id="import-btn">Import Component</button>
        <button type="button" class="btn btn-outline" id="export-btn">Export Component</button>
        <button type="button" class="btn btn-outline" id="clear-btn">Clear All</button>
        <input type="file" id="import-file" accept="application/json,.json" class="hidden">
      </div>
    </header>

    <section class="panel">
      <h2>Component Info</h2>
      <div class="form-group">
        <label for="component-name">Component Name</label>
        <input type="text" id="component-name" class="meta-input" placeholder="e.g. Netherite Gear Pack">
      </div>
    </section>

    <section class="panel">
      <h2 id="form-title">Add Item</h2>
      <form id="item-form">
        <input type="hidden" id="edit-id">
        <div class="form-row">
          <div class="form-group"><label for="item-name">Item Name</label><input type="text" id="item-name" required placeholder="e.g. Diamond"></div>
          <div class="form-group"><label for="item-category">Category</label><input type="text" id="item-category" list="category-list" value="Misc"><datalist id="category-list"></datalist></div>
          <div class="form-group"><label for="price-per-item">Price per Item</label><input type="number" id="price-per-item" min="0" step="0.01" required placeholder="0.00"></div>
          <div class="form-group form-group-sm"><label for="stack-size">Stack Size</label><input type="number" id="stack-size" value="64" min="1" max="9999"></div>
        </div>
        <div class="form-row form-row-2">
          <div class="form-group">
            <label for="item-icon">Item Icon</label>
            <div class="icon-upload-area" id="drop-zone">
              <input type="file" id="item-icon" accept="image/png,image/jpeg,image/gif,image/webp">
              <div class="upload-placeholder" id="upload-placeholder"><span>📁</span><span>Drop texture or click</span><span class="upload-hint">PNG, JPG, GIF, WebP</span></div>
              <img id="icon-preview" class="icon-preview hidden" alt="">
            </div>
          </div>
          <div class="form-group">
            <label>Price Preview</label>
            <div class="price-preview">
              <div class="price-row"><span class="price-label">Per Item</span><span class="price-value" id="preview-item">—</span></div>
              <div class="price-row"><span class="price-label">Half Stack <small id="preview-half-count">(32)</small></span><span class="price-value" id="preview-half">—</span></div>
              <div class="price-row"><span class="price-label">Full Stack <small id="preview-full-count">(64)</small></span><span class="price-value" id="preview-full">—</span></div>
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">Add Item</button>
          <button type="button" class="btn btn-secondary hidden" id="cancel-btn">Cancel</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Items <span class="item-count" id="item-count">0</span></h2>
        <div class="filter-bar">
          <div class="search-box"><input type="text" id="search" placeholder="Search items…"></div>
          <div class="sort-controls">
            <label for="sort-field">Sort</label>
            <select id="sort-field"><option value="name">Name</option><option value="price">Price</option><option value="category">Category</option></select>
            <button type="button" class="btn btn-sort" id="sort-direction">↑ Asc</button>
          </div>
        </div>
      </div>
      <div class="category-filters" id="category-filters"></div>
      <div class="items-grid" id="items-grid"></div>
    </section>

    <footer class="footer"><p>Auto-saved in browser · Export and import in the admin panel via <strong>Import Component</strong></p></footer>
  </div>
  <div class="toast-container" id="toast-container"></div>

  <script>
    const STORAGE_KEY = 'mystic-item-component-draft';
    const DEFAULT_CATEGORIES = ['Blocks', 'Tools', 'Food', 'Resources', 'Redstone', 'Misc'];

    let items = [];
    let categories = [...DEFAULT_CATEGORIES];
    let editingId = null;
    let editingIconData = null;
    let activeCategory = '';
    let sortDirection = 'asc';

    const componentNameInput = document.getElementById('component-name');
    const form = document.getElementById('item-form');
    const formTitle = document.getElementById('form-title');
    const editIdInput = document.getElementById('edit-id');
    const nameInput = document.getElementById('item-name');
    const categoryInput = document.getElementById('item-category');
    const categoryList = document.getElementById('category-list');
    const priceInput = document.getElementById('price-per-item');
    const stackInput = document.getElementById('stack-size');
    const iconInput = document.getElementById('item-icon');
    const dropZone = document.getElementById('drop-zone');
    const uploadPlaceholder = document.getElementById('upload-placeholder');
    const iconPreview = document.getElementById('icon-preview');
    const submitBtn = document.getElementById('submit-btn');
    const cancelBtn = document.getElementById('cancel-btn');
    const itemsGrid = document.getElementById('items-grid');
    const itemCount = document.getElementById('item-count');
    const searchInput = document.getElementById('search');
    const categoryFilters = document.getElementById('category-filters');
    const sortFieldSelect = document.getElementById('sort-field');
    const sortDirectionBtn = document.getElementById('sort-direction');

    function uuid() { return crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now() + '-' + Math.random().toString(16).slice(2); }
    function formatPrice(v) { return v == null || isNaN(v) ? '—' : v.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 }); }
    function calcPrices(p, s) { const h = Math.floor(s / 2); return { perItem: p, halfStack: p * h, fullStack: p * s, halfCount: h, fullCount: s }; }
    function getCat(item) { return item.category || 'Misc'; }
    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function showToast(msg, type = 'success') {
      const t = document.createElement('div');
      t.className = 'toast ' + type;
      t.textContent = msg;
      document.getElementById('toast-container').appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    function ensureCategory(name) {
      const t = (name || 'Misc').trim();
      if (!categories.some(c => c.toLowerCase() === t.toLowerCase())) {
        categories.push(t);
        categories.sort((a, b) => a.localeCompare(b));
      }
      return categories.find(c => c.toLowerCase() === t.toLowerCase()) || t;
    }

    function saveDraft() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        componentName: componentNameInput.value.trim(),
        categories,
        items,
      }));
    }

    function loadDraft() {
      try {
        const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!data) return;
        componentNameInput.value = data.componentName || '';
        categories = Array.isArray(data.categories) && data.categories.length ? data.categories : [...DEFAULT_CATEGORIES];
        items = Array.isArray(data.items) ? data.items : [];
      } catch { /* ignore */ }
    }

    function updatePricePreview() {
      const price = parseFloat(priceInput.value);
      const stack = parseInt(stackInput.value, 10) || 64;
      const p = isNaN(price) ? null : calcPrices(price, stack);
      document.getElementById('preview-item').textContent = p ? formatPrice(p.perItem) : '—';
      document.getElementById('preview-half').textContent = p ? formatPrice(p.halfStack) : '—';
      document.getElementById('preview-full').textContent = p ? formatPrice(p.fullStack) : '—';
      document.getElementById('preview-half-count').textContent = '(' + Math.floor(stack / 2) + ')';
      document.getElementById('preview-full-count').textContent = '(' + stack + ')';
    }

    function resetForm() {
      editingId = null;
      editingIconData = null;
      form.reset();
      stackInput.value = '64';
      categoryInput.value = 'Misc';
      editIdInput.value = '';
      formTitle.textContent = 'Add Item';
      submitBtn.textContent = 'Add Item';
      cancelBtn.classList.add('hidden');
      iconPreview.classList.add('hidden');
      uploadPlaceholder.classList.remove('hidden');
      updatePricePreview();
    }

    function showIconPreview(src) {
      if (!src) return;
      iconPreview.src = src;
      iconPreview.classList.remove('hidden');
      uploadPlaceholder.classList.add('hidden');
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }

    function getFilteredItems() {
      const q = searchInput.value.toLowerCase().trim();
      return items.filter(i => (!q || i.name.toLowerCase().includes(q)) && (!activeCategory || getCat(i) === activeCategory));
    }

    function sortItems(list) {
      const field = sortFieldSelect.value;
      const mult = sortDirection === 'asc' ? 1 : -1;
      return [...list].sort((a, b) => {
        let cmp = 0;
        if (field === 'price') cmp = a.pricePerItem - b.pricePerItem;
        else if (field === 'category') { cmp = getCat(a).localeCompare(getCat(b)); if (!cmp) cmp = a.name.localeCompare(b.name); }
        else cmp = a.name.localeCompare(b.name);
        return cmp * mult;
      });
    }

    function renderCategoryDatalist() {
      categoryList.innerHTML = categories.map(c => `<option value="${escapeHtml(c)}">`).join('');
    }

    function renderCategoryFilters() {
      const counts = {};
      items.forEach(i => { const c = getCat(i); counts[c] = (counts[c] || 0) + 1; });
      const all = [...new Set([...categories, ...Object.keys(counts)])].sort((a, b) => a.localeCompare(b));
      categoryFilters.innerHTML = `<button type="button" class="filter-chip${activeCategory === '' ? ' active' : ''}" data-category="">All (${items.length})</button>` +
        all.filter(c => counts[c]).map(c => `<button type="button" class="filter-chip${activeCategory === c ? ' active' : ''}" data-category="${escapeHtml(c)}">${escapeHtml(c)} (${counts[c]})</button>`).join('');
    }

    function renderItems() {
      itemCount.textContent = items.length;
      renderCategoryDatalist();
      renderCategoryFilters();
      const filtered = sortItems(getFilteredItems());
      const hasFilters = searchInput.value.trim() || activeCategory;

      if (!filtered.length) {
        itemsGrid.innerHTML = `<div class="empty-state"><span class="empty-icon">${hasFilters ? '🔍' : '🗃️'}</span><p>${hasFilters ? 'No items match your filters.' : 'No items yet. Add your first item above.'}</p></div>`;
        return;
      }

      itemsGrid.innerHTML = filtered.map(item => {
        const p = calcPrices(item.pricePerItem, item.stackSize);
        const icon = item.iconData ? `<img src="${item.iconData}" alt="">` : '<span class="no-icon">?</span>';
        return `<article class="item-card"><div class="item-card-header"><div class="item-icon-wrap">${icon}</div><div><div class="item-name">${escapeHtml(item.name)}</div><span class="category-badge">${escapeHtml(getCat(item))}</span></div></div><div class="item-prices"><div class="price-chip"><span class="price-chip-label">Per Item</span><span class="price-chip-value">${formatPrice(p.perItem)}</span></div><div class="price-chip"><span class="price-chip-label">Half (${p.halfCount})</span><span class="price-chip-value">${formatPrice(p.halfStack)}</span></div><div class="price-chip"><span class="price-chip-label">Stack (${p.fullCount})</span><span class="price-chip-value">${formatPrice(p.fullStack)}</span></div></div><div class="item-card-actions"><button type="button" class="btn btn-edit" data-action="edit" data-id="${item.id}">Edit</button><button type="button" class="btn btn-danger" data-action="delete" data-id="${item.id}">Delete</button></div></article>`;
      }).join('');
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const price = parseFloat(priceInput.value);
      if (isNaN(price) || price < 0) { showToast('Enter a valid price', 'error'); return; }

      let iconData = editingIconData;
      if (iconInput.files[0]) iconData = await readFileAsDataUrl(iconInput.files[0]);

      const payload = {
        id: editingId || uuid(),
        name: nameInput.value.trim(),
        category: ensureCategory(categoryInput.value),
        pricePerItem: price,
        stackSize: parseInt(stackInput.value, 10) || 64,
        iconData: iconData || null,
        createdAt: editingId ? items.find(i => i.id === editingId)?.createdAt : new Date().toISOString(),
        updatedAt: new Date().toISOString(),
      };

      if (editingId) {
        const idx = items.findIndex(i => i.id === editingId);
        if (idx !== -1) items[idx] = payload;
        showToast('"' + payload.name + '" updated');
      } else {
        items.push(payload);
        showToast('"' + payload.name + '" added');
      }

      saveDraft();
      resetForm();
      renderItems();
    }

    function startEdit(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      editingId = id;
      editingIconData = item.iconData || null;
      editIdInput.value = id;
      nameInput.value = item.name;
      categoryInput.value = getCat(item);
      priceInput.value = item.pricePerItem;
      stackInput.value = item.stackSize;
      formTitle.textContent = 'Edit Item';
      submitBtn.textContent = 'Save Changes';
      cancelBtn.classList.remove('hidden');
      iconInput.value = '';
      if (item.iconData) showIconPreview(item.iconData);
      else { iconPreview.classList.add('hidden'); uploadPlaceholder.classList.remove('hidden'); }
      updatePricePreview();
      form.scrollIntoView({ behavior: 'smooth' });
    }

    function deleteItem(id) {
      const item = items.find(i => i.id === id);
      if (!item || !confirm('Delete "' + item.name + '"?')) return;
      items = items.filter(i => i.id !== id);
      if (editingId === id) resetForm();
      saveDraft();
      renderItems();
      showToast('"' + item.name + '" deleted');
    }

    function buildComponent() {
      return {
        version: 1,
        type: 'mystic-item-component',
        componentName: componentNameInput.value.trim() || 'Unnamed Component',
        exportedAt: new Date().toISOString(),
        categories: [...categories],
        items: items.map(({ id, name, category, pricePerItem, stackSize, iconData, createdAt, updatedAt }) =>
          ({ id, name, category, pricePerItem, stackSize, iconData, createdAt, updatedAt })),
      };
    }

    function exportComponent() {
      if (!items.length) { showToast('Add at least one item before exporting', 'error'); return; }
      const data = buildComponent();
      const slug = (data.componentName || 'component').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = slug + '.component.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('Component exported (' + items.length + ' items)');
    }

    async function importComponentFile(file) {
      try {
        const data = JSON.parse(await file.text());
        if (data.type !== 'mystic-item-component' || !Array.isArray(data.items)) {
          showToast('Invalid component file', 'error');
          return;
        }
        if (items.length && !confirm('Replace your current draft with "' + (data.componentName || 'component') + '"?')) return;
        componentNameInput.value = data.componentName || '';
        categories = Array.isArray(data.categories) && data.categories.length ? data.categories : [...DEFAULT_CATEGORIES];
        items = data.items;
        activeCategory = '';
        searchInput.value = '';
        resetForm();
        saveDraft();
        renderItems();
        showToast('Component loaded (' + items.length + ' items)');
      } catch {
        showToast('Invalid JSON file', 'error');
      } finally {
        document.getElementById('import-file').value = '';
      }
    }

    function clearAll() {
      if (items.length && !confirm('Clear all items and start fresh?')) return;
      items = [];
      categories = [...DEFAULT_CATEGORIES];
      componentNameInput.value = '';
      activeCategory = '';
      searchInput.value = '';
      resetForm();
      saveDraft();
      renderItems();
      showToast('Draft cleared');
    }

    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', async e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        const dt = new DataTransfer();
        dt.items.add(file);
        iconInput.files = dt.files;
        editingIconData = await readFileAsDataUrl(file);
        showIconPreview(editingIconData);
      }
    });
    iconInput.addEventListener('change', async () => {
      if (iconInput.files[0]) {
        editingIconData = await readFileAsDataUrl(iconInput.files[0]);
        showIconPreview(editingIconData);
      }
    });
    priceInput.addEventListener('input', updatePricePreview);
    stackInput.addEventListener('input', updatePricePreview);
    componentNameInput.addEventListener('input', saveDraft);
    form.addEventListener('submit', handleSubmit);
    cancelBtn.addEventListener('click', resetForm);
    searchInput.addEventListener('input', renderItems);
    sortFieldSelect.addEventListener('change', renderItems);
    sortDirectionBtn.addEventListener('click', () => {
      sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
      sortDirectionBtn.textContent = sortDirection === 'asc' ? '↑ Asc' : '↓ Desc';
      sortDirectionBtn.classList.toggle('desc', sortDirection === 'desc');
      renderItems();
    });
    categoryFilters.addEventListener('click', e => {
      const chip = e.target.closest('.filter-chip');
      if (!chip) return;
      activeCategory = chip.dataset.category || '';
      renderItems();
    });
    itemsGrid.addEventListener('click', e => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      if (btn.dataset.action === 'edit') startEdit(btn.dataset.id);
      if (btn.dataset.action === 'delete') deleteItem(btn.dataset.id);
    });
    document.getElementById('export-btn').addEventListener('click', exportComponent);
    document.getElementById('import-btn').addEventListener('click', () => document.getElementById('import-file').click());
    document.getElementById('import-file').addEventListener('change', e => { if (e.target.files[0]) importComponentFile(e.target.files[0]); });
    document.getElementById('clear-btn').addEventListener('click', clearAll);

    loadDraft();
    updatePricePreview();
    renderItems();
  </script>
</body>
</html>
